<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote · TJ Selfie Station</title>
<meta name="description" content="Get a fast, personalized photo booth quote from TJ Selfie Station — serving Boston & Greater Boston area.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#080c18;--deep:#04060f;--gold:#c9a84c;--gold-light:#e8c96a;
  --gold-dim:rgba(201,168,76,0.18);--white:#f5f0e8;
  --gray:rgba(245,240,232,0.55);--gray-dim:rgba(245,240,232,0.28);
  --card-bg:rgba(201,168,76,0.02);--border:rgba(201,168,76,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--deep);color:var(--white);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 75% 15%,rgba(201,168,76,.07) 0%,transparent 65%),
    radial-gradient(ellipse 45% 45% at 10% 85%,rgba(201,168,76,.04) 0%,transparent 60%),var(--deep)}
.spark{position:fixed;border-radius:50%;background:var(--gold);opacity:0;pointer-events:none;z-index:1;animation:sparkle var(--d) var(--del) infinite}
@keyframes sparkle{0%,100%{opacity:0;transform:translateY(0) scale(0)}30%,70%{opacity:.5}50%{opacity:1;transform:translateY(-55px) scale(1)}}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3.5rem;background:rgba(4,6,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.09)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;letter-spacing:.06em;color:var(--gold);text-decoration:none}
.logo span{color:rgba(245,240,232,.4)}
.back-link{display:flex;align-items:center;gap:.5rem;font-size:.73rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-dim);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--gold)}
.back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}

.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:7.5rem 1.5rem 5rem}

.intro{text-align:center;margin-bottom:3rem;animation:fadeUp .75s .1s both}
.eyebrow{display:inline-flex;align-items:center;gap:.65rem;font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:1.1rem}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:20px;height:1px;background:var(--gold)}
.intro h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4.5vw,3.2rem);font-weight:300;line-height:1.1;margin-bottom:.7rem}
.intro h1 i{color:var(--gold);font-weight:400}
.intro p{font-size:.9rem;color:var(--gray);line-height:1.75;max-width:380px;margin:0 auto}

/* Progress */
.prog-wrap{width:100%;max-width:580px;margin-bottom:2.2rem;animation:fadeUp .75s .2s both}
.prog-track{display:flex;align-items:flex-start;padding:0 4px}
.prog-connector{flex:1;height:1px;background:var(--border);margin-top:15px;position:relative;overflow:hidden;border-radius:1px}
.prog-connector-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);width:0%;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-dot{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex-shrink:0}
.prog-dot-circle{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:#08090f;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--gray-dim);transition:all .3s;position:relative;z-index:1}
.prog-dot.active .prog-dot-circle{border-color:var(--gold);color:var(--gold);background:#0d1020;box-shadow:0 0 16px rgba(201,168,76,.25)}
.prog-dot.done .prog-dot-circle{border-color:var(--gold);background:var(--gold);color:var(--deep);font-size:.68rem;font-weight:700;font-family:'Outfit',sans-serif}
.prog-dot-label{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-dim);text-align:center;transition:color .3s;white-space:nowrap}
.prog-dot.active .prog-dot-label{color:var(--gold)}
.prog-dot.done .prog-dot-label{color:rgba(201,168,76,.6)}

/* Card */
.card{width:100%;max-width:580px;border:1px solid var(--border);background:var(--card-bg);border-radius:4px;padding:2.4rem 2.5rem;position:relative;overflow:hidden;animation:fadeUp .45s both}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent)}
.card-label{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.card-label::after{content:'';flex:1;height:1px;background:var(--gold-dim)}
.card-q{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;line-height:1.25;margin-bottom:.4rem}
.card-hint{font-size:.8rem;color:var(--gray);line-height:1.65;margin-bottom:1.8rem}

/* Tiles */
.opt-grid{display:grid;gap:.7rem}
.opt-grid.g2{grid-template-columns:1fr 1fr}
.opt-grid.g3{grid-template-columns:1fr 1fr 1fr}
.opt-grid.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.tile{border:1px solid var(--border);border-radius:3px;background:transparent;padding:.95rem .9rem;cursor:pointer;display:flex;align-items:flex-start;gap:.75rem;text-align:left;width:100%;font-family:'Outfit',sans-serif;color:var(--white);transition:border-color .2s,background .2s,transform .15s,box-shadow .2s}
.tile:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.035);transform:translateY(-1px)}
.tile.sel{border-color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 22px rgba(201,168,76,.1)}
.tile-icon{font-size:1.25rem;line-height:1;flex-shrink:0;margin-top:.05rem}
.tile-name{font-size:.85rem;font-weight:500;margin-bottom:.12rem;line-height:1.3;display:block}
.tile-sub{font-size:.73rem;color:var(--gray);line-height:1.5;display:block}
.tile.compact{justify-content:center;text-align:center;padding:.85rem .6rem;flex-direction:column;align-items:center;gap:.2rem}
.tile.compact .tile-icon{font-size:1.1rem;margin:0}
.tile.compact .tile-name{font-size:.82rem}
.tile.compact .tile-sub{font-size:.7rem}
.opt-sub-label{font-size:.73rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;margin-top:.3rem;display:block}

/* Fields */
.fields{display:flex;flex-direction:column;gap:1rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.field input{width:100%;background:rgba(201,168,76,.02);border:1px solid var(--border);border-radius:2px;padding:.85rem 1rem;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:300;color:var(--white);outline:none;transition:border-color .2s,background .2s}
.field input:focus{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.04)}
.field input::placeholder{color:rgba(245,240,232,.2)}

/* Nav buttons */
.btn-row{display:flex;align-items:center;justify-content:space-between;margin-top:2rem;gap:1rem}
.btn-back{background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-dim);transition:color .2s;padding:0}
.btn-back:hover{color:var(--gold)}
.btn-next{margin-left:auto;background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:.85rem 2rem;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .15s}
.btn-next:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-next:disabled{background:rgba(201,168,76,.25);color:rgba(8,12,24,.5);cursor:default;transform:none}

/* Submit button */
.btn-submit{width:100%;margin-top:1.8rem;background:var(--gold);color:var(--deep);border:none;border-radius:2px;padding:1.1rem 2rem;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:.7rem}
.btn-submit:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-submit:disabled{background:rgba(201,168,76,.3);color:rgba(8,12,24,.5);cursor:default;transform:none}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(8,12,24,.3);border-top-color:var(--deep);animation:spin .7s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Success */
.success-card{width:100%;max-width:580px;border:1px solid rgba(201,168,76,.5);background:linear-gradient(150deg,rgba(201,168,76,.07),rgba(201,168,76,.02));border-radius:4px;padding:3rem 2.5rem;text-align:center;position:relative;overflow:hidden;animation:fadeUp .5s both}
.success-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.success-icon{font-size:3rem;margin-bottom:1.2rem;display:block}
.success-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;line-height:1.2;margin-bottom:.6rem}
.success-msg{font-size:.9rem;color:var(--gray);line-height:1.75;max-width:380px;margin:0 auto 2rem}
.success-pkg{background:rgba(201,168,76,.04);border:1px solid var(--gold-dim);border-radius:3px;padding:1.4rem 1.6rem;margin-bottom:1.8rem;text-align:left}
.success-pkg-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.success-pkg-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;margin-bottom:.1rem}
.success-pkg-price{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold);font-weight:300;line-height:1}
.success-pkg-desc{font-size:.78rem;color:var(--gray);margin-top:.4rem;line-height:1.6}
.success-divider{height:1px;background:var(--gold-dim);margin:1.8rem 0}
.success-contact{font-size:.85rem;color:var(--gray);line-height:1.75;margin-bottom:1.5rem}
.success-contact strong{color:var(--white)}
.btn-another{background:transparent;border:1px solid rgba(245,240,232,.15);border-radius:2px;padding:.9rem 2rem;font-family:'Outfit',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);cursor:pointer;transition:border-color .2s,color .2s}
.btn-another:hover{border-color:var(--gold);color:var(--gold)}

/* Error fallback */
.error-note{background:rgba(200,60,60,.06);border:1px solid rgba(200,60,60,.2);border-radius:3px;padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:.82rem;color:rgba(255,180,180,.8);line-height:1.6}
.fallback-btns{display:flex;flex-direction:column;gap:.7rem}
.btn-sms{display:flex;align-items:center;justify-content:center;gap:.7rem;background:var(--gold);color:var(--deep);text-decoration:none;border-radius:2px;padding:1rem 2rem;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;transition:background .2s}
.btn-sms:hover{background:var(--gold-light)}
.btn-email{display:flex;align-items:center;justify-content:center;gap:.7rem;background:transparent;color:var(--white);text-decoration:none;border-radius:2px;padding:1rem 2rem;border:1px solid rgba(245,240,232,.18);font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;transition:border-color .2s,color .2s}
.btn-email:hover{border-color:var(--gold);color:var(--gold)}
.restart-wrap{text-align:center;margin-top:1.4rem}
.restart-btn{background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,240,232,.22);transition:color .2s}
.restart-btn:hover{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── SCROLL PROGRESS ── */
#q-progress{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold-light));z-index:9999;transition:width .15s linear;box-shadow:0 0 8px rgba(201,168,76,.6)}

/* ── GOLD GLOW TEXT ── */
@keyframes goldGlow{0%,100%{color:var(--gold);text-shadow:0 0 0 rgba(201,168,76,0)}50%{color:var(--gold-light);text-shadow:0 0 20px rgba(201,168,76,.45),0 0 40px rgba(201,168,76,.2)}}
.intro h1 i{color:var(--gold);animation:goldGlow 3.5s ease-in-out infinite;font-style:italic}

/* ── TILE SELECTION BURST ── */
@keyframes tilePop{0%{transform:scale(1)}40%{transform:scale(0.96)}70%{transform:scale(1.03)}100%{transform:scale(1)}}
.tile.sel{animation:tilePop .3s ease-out}
.tile{transition:border-color .2s,background .2s,transform .2s,box-shadow .2s}
.tile:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.tile.sel{box-shadow:0 0 0 1px var(--gold),0 8px 32px rgba(201,168,76,.18)!important}

/* ── CARD SLIDE TRANSITION ── */
@keyframes slideInRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
.card.slide-in{animation:slideInRight .4s cubic-bezier(.22,1,.36,1) both}
.card.slide-in-back{animation:slideInLeft .4s cubic-bezier(.22,1,.36,1) both}

/* ── PROGRESS DOT PULSE ── */
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}70%{box-shadow:0 0 0 10px rgba(201,168,76,0)}}
.prog-dot.active .prog-dot-circle{animation:dotPulse 1.8s ease-out infinite}

/* ── CONNECTOR FILL ANIMATION ── */
.prog-connector-fill{transition:width .6s cubic-bezier(.4,0,.2,1)!important}

/* ── FIELD FOCUS GLOW ── */
.field input{transition:border-color .25s,background .25s,box-shadow .25s}
.field input:focus{box-shadow:0 0 0 3px rgba(201,168,76,.12);border-color:rgba(201,168,76,.55)!important}

/* ── BTN NEXT RIPPLE ── */
.btn-next,.btn-submit{position:relative;overflow:hidden}
.btn-next::after,.btn-submit::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.25);width:0;height:0;top:50%;left:50%;transform:translate(-50%,-50%);transition:width .5s,height .5s,opacity .5s;opacity:0;pointer-events:none}
.btn-next:active::after,.btn-submit:active::after{width:300px;height:300px;opacity:0}

/* ── PULSE RING ON BTN-NEXT ── */
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}70%{box-shadow:0 0 0 10px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}
.btn-next:not(:disabled){animation:pulseRing 2.5s ease-out infinite}
.btn-submit:not(:disabled){animation:pulseRing 2.5s ease-out infinite}

/* ── SUCCESS CONFETTI ── */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall var(--dur) var(--delay) ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ── SUCCESS CARD GLOW ── */
.success-card{animation:fadeUp .5s both,successGlow 3s 0.5s ease-out forwards}
@keyframes successGlow{0%{box-shadow:0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 60px rgba(201,168,76,.2)}100%{box-shadow:0 0 30px rgba(201,168,76,.1)}}

/* ── EYEBROW DIVIDERS ANIMATE ── */
.eyebrow::before,.eyebrow::after{transition:width .6s ease}
.intro.visible .eyebrow::before,.intro.visible .eyebrow::after{width:40px}
.eyebrow::before,.eyebrow::after{width:0!important}

/* ── NAV SCROLL SHRINK ── */
nav.scrolled{padding:.7rem 1.5rem!important;background:rgba(4,6,15,.98)!important;box-shadow:0 4px 30px rgba(0,0,0,.4)}

/* ── BACK LINK HOVER ── */
.back-link{transition:color .2s,gap .2s}
.back-link:hover{gap:.8rem}

/* ── CURSOR GLOW ── */
#cursor-glow-q{position:fixed;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.2) 0%,transparent 70%);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:opacity .3s}

@media(max-width:640px){
  nav{padding:1rem 1.5rem}
  .page{padding:6.5rem 1rem 4rem}
  .card,.success-card{padding:1.8rem 1.5rem}
  .opt-grid.g2{grid-template-columns:1fr}
  .opt-grid.g3{grid-template-columns:1fr 1fr}
  .opt-grid.g4{grid-template-columns:1fr 1fr}
  .row2{grid-template-columns:1fr}
  .prog-dot-label{display:none}
}
@media(max-width:400px){
  .opt-grid.g3,.opt-grid.g4{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="q-progress"></div>
<div id="cursor-glow-q"></div>
<div class="bg"></div>

<nav>
  <a href="/" class="logo">TJ <span>Selfie Station</span></a>
  <a href="/" class="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Site
  </a>
</nav>

<div class="page">
  <div class="intro">
    <div class="eyebrow">Free · No Pressure</div>
    <h1>Get your <i>personalized</i><br>quote in 60 seconds</h1>
    <p>Answer a few quick questions and we'll match you with the perfect package and price.</p>
  </div>

  <div class="prog-wrap">
    <div class="prog-track">
      <div class="prog-dot active" id="pd0"><div class="prog-dot-circle">1</div><div class="prog-dot-label">Event</div></div>
      <div class="prog-connector" id="pc0"><div class="prog-connector-fill"></div></div>
      <div class="prog-dot" id="pd1"><div class="prog-dot-circle">2</div><div class="prog-dot-label">Booth</div></div>
      <div class="prog-connector" id="pc1"><div class="prog-connector-fill"></div></div>
      <div class="prog-dot" id="pd2"><div class="prog-dot-circle">3</div><div class="prog-dot-label">Details</div></div>
      <div class="prog-connector" id="pc2"><div class="prog-connector-fill"></div></div>
      <div class="prog-dot" id="pd3"><div class="prog-dot-circle">4</div><div class="prog-dot-label">Contact</div></div>
    </div>
  </div>

  <div id="quiz" style="width:100%;max-width:580px"></div>
</div>

<script>
/* ─────────────────────────────────────────────────────────
   ⚙️  SETUP — paste your Formspree Form ID here (see below)
───────────────────────────────────────────────────────── */
const FORMSPREE_ID = 'maqldryg';

/* ── PACKAGES ── */
const PKGS = [
  {booth:'ipad',  hrs:2,price:250,name:'Classic',   tag:'',           tagline:'Great for birthdays & baby showers',             feats:['2 hrs of coverage','1 photo template','Standard props','Digital photos','Choice of backdrop','Professional attendant']},
  {booth:'ipad',  hrs:4,price:350,name:'Classic+',  tag:'',           tagline:'More time, same great iPad setup',               feats:['4 hrs of coverage','1 photo template','Standard props','Digital photos','Choice of backdrop','Professional attendant']},
  {booth:'ipad',  hrs:2,price:375,name:'Elite',     tag:'Best iPad',  tagline:'Personalized from start to finish',              feats:['2 hrs of coverage','Multiple templates','Tailored props','Full digital gallery','Choice of backdrop','Professional attendant']},
  {booth:'ipad',  hrs:4,price:450,name:'Elite+',    tag:'',           tagline:'Full customization, full coverage',              feats:['4 hrs of coverage','Multiple templates','Tailored props','Full digital gallery','Choice of backdrop','Professional attendant']},
  {booth:'studio',hrs:3,price:449,name:'Premium',   tag:'',           tagline:'Noticeably sharper than iPad — DSLR quality',    feats:['3 hrs of coverage','Canon EOS R8','1 photo template','Standard props','Digital photos','Choice of backdrop']},
  {booth:'studio',hrs:4,price:549,name:'Premium+',  tag:'',           tagline:'Canon R8 quality all night long',                feats:['4 hrs of coverage','Canon EOS R8','1 photo template','Standard props','Digital photos','Choice of backdrop']},
  {booth:'studio',hrs:3,price:549,name:'Signature', tag:'Flagship',   tagline:'Full Canon R8 customization for upscale events', feats:['3 hrs of coverage','Canon EOS R8','Multiple templates','Tailored props','Full digital gallery','Choice of backdrop']},
  {booth:'studio',hrs:4,price:649,name:'Signature+',tag:'Best We Offer',tagline:'The full experience — the best we offer, period',feats:['4 hrs of coverage','Canon EOS R8','Multiple templates','Tailored props','Full digital gallery','Choice of backdrop']},
];

const A = {eventType:null,date:'',startTime:'',venue:'',booth:null,hrs:null,prints:'no',guests:null,name:'',phone:'',email:'',notes:''};
let step = 0;
const TOTAL = 4;
const EL = {wedding:'Wedding / Gala',quince:'Quinceañera / Sweet 16',birthday:'Birthday Party',corporate:'Corporate Event',grad:'Graduation',other:'Other Celebration'};
const BL = {ipad:'iPad Booth',studio:'Studio Booth — Canon EOS R8',unsure:'Not sure yet'};

/* ── STEP CONTENT ── */
function renderStep0(){
  const events=[
    {id:'wedding',icon:'💍',name:'Wedding / Gala',sub:'Formal & upscale'},
    {id:'quince',icon:'🎊',name:'Quinceañera / Sweet 16',sub:'Milestone birthday event'},
    {id:'birthday',icon:'🎂',name:'Birthday Party',sub:'Birthdays & baby showers'},
    {id:'corporate',icon:'🏢',name:'Corporate Event',sub:'Company parties & ceremonies'},
    {id:'grad',icon:'🎓',name:'Graduation',sub:'School & ceremony'},
    {id:'other',icon:'✨',name:'Other Celebration',sub:'Anniversaries, holidays & more'},
  ];
  return `<div class="opt-grid g2">${events.map(e=>`
    <button class="tile${A.eventType===e.id?' sel':''}" data-val="${e.id}" onclick="pick('eventType','${e.id}',this)">
      <span class="tile-icon">${e.icon}</span>
      <span><span class="tile-name">${e.name}</span><span class="tile-sub">${e.sub}</span></span>
    </button>`).join('')}</div>`;
}

function renderStep1(){
  const booths=[
    {id:'ipad',icon:'📱',name:'iPad Booth',sub:'Clean & reliable. Starts at $250.'},
    {id:'studio',icon:'📸',name:'Studio Booth',sub:'Canon EOS R8 DSLR. Starts at $449.'},
    {id:'unsure',icon:'🤷',name:'Not sure yet',sub:'Anthony will help you choose.'},
  ];
  const hrs=[
    {id:'2',icon:'⏱',name:'2 Hours',sub:'Short events'},
    {id:'3',icon:'⏰',name:'3 Hours',sub:'Most events'},
    {id:'4',icon:'🕰',name:'4 Hours',sub:'Long events'},
  ];
  return `
    <span class="opt-sub-label">Booth Type</span>
    <div class="opt-grid g3" style="margin-bottom:1.4rem">${booths.map(o=>`
      <button class="tile${A.booth===o.id?' sel':''}" data-val="${o.id}" data-group="booth" onclick="pick('booth','${o.id}',this)">
        <span class="tile-icon">${o.icon}</span>
        <span><span class="tile-name">${o.name}</span><span class="tile-sub">${o.sub}</span></span>
      </button>`).join('')}</div>
    <span class="opt-sub-label">Duration</span>
    <div class="opt-grid g3">${hrs.map(h=>`
      <button class="tile compact${A.hrs===h.id?' sel':''}" data-val="${h.id}" data-group="hrs" onclick="pick('hrs','${h.id}',this)">
        <span class="tile-icon">${h.icon}</span>
        <span class="tile-name">${h.name}</span>
        <span class="tile-sub">${h.sub}</span>
      </button>`).join('')}</div>`;
}

function renderStep2(){
  const counts=[
    {id:'1-50',name:'1 – 50',sub:'Intimate'},
    {id:'51-100',name:'51 – 100',sub:'Medium'},
    {id:'101-150',name:'101 – 150',sub:'Large'},
    {id:'150+',name:'150+',sub:'Big event'},
  ];
  return `
    <div class="fields">
      <div class="row2">
        <div class="field"><label for="f_date">Event Date *</label>
          <input id="f_date" type="date" value="${A.date}" oninput="sf('date',this.value);chk2()"></div>
        <div class="field"><label for="f_time">Start Time *</label>
          <input id="f_time" type="time" value="${A.startTime}" oninput="sf('startTime',this.value);chk2()"></div>
      </div>
      <div class="field"><label for="f_venue">Venue / Location *</label>
        <input id="f_venue" type="text" placeholder="Venue name + city  (e.g. The Grand Hall, Lynn)" value="${A.venue}" oninput="sf('venue',this.value);chk2()"></div>
      <span class="opt-sub-label">Estimated Guest Count *</span>
      <div class="opt-grid g4">${counts.map(c=>`
        <button class="tile compact${A.guests===c.id?' sel':''}" data-val="${c.id}" data-group="guests" onclick="pick('guests','${c.id}',this);chk2()">
          <span class="tile-name">${c.name}</span><span class="tile-sub">${c.sub}</span>
        </button>`).join('')}</div>
    </div>`;
}

function renderStep3(){
  return `
    <div class="fields">
      <div class="row2">
        <div class="field"><label for="f_name">Your Name *</label>
          <input id="f_name" type="text" placeholder="First & last name" value="${A.name}" autocomplete="name" oninput="sf('name',this.value);chk3()"></div>
        <div class="field"><label for="f_phone">Phone Number *</label>
          <input id="f_phone" type="tel" placeholder="(781) 555-1234" value="${A.phone}" autocomplete="tel" oninput="sf('phone',this.value);chk3()"></div>
      </div>
      <div class="field">
        <label for="f_email">Email Address <span style="color:var(--gray-dim);font-size:.62rem;text-transform:none;letter-spacing:0;font-weight:300">(optional)</span></label>
        <input id="f_email" type="email" placeholder="you@example.com" value="${A.email}" autocomplete="email" oninput="sf('email',this.value)">
      </div>
      <div class="field">
        <label for="f_notes">Anything we should know? <span style="color:var(--gray-dim);font-size:.62rem;text-transform:none;letter-spacing:0;font-weight:300">(optional)</span></label>
        <input id="f_notes" type="text" placeholder="Theme, special requests, questions…" value="${A.notes}" oninput="sf('notes',this.value)">
      </div>
    </div>
    <button class="btn-submit" id="btnSubmit" onclick="submitForm()" disabled>
      <span id="submitLabel">Send My Quote Request →</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <p style="text-align:center;font-size:.72rem;color:var(--gray-dim);margin-top:.8rem;line-height:1.5">Anthony typically responds within a few hours</p>`;
}

/* ── RENDER ── */
function render(){
  updateProgress();
  const s = [{label:'Step 1 of 4 · Event',q:'What kind of event is it?',hint:'Pick the option that best describes your celebration.',render:renderStep0},{label:'Step 2 of 4 · Booth',q:'Which booth experience fits you?',hint:'Both include backdrop, props, attendant & digital photos. The Studio booth uses a Canon EOS R8 DSLR for sharper shots.',render:renderStep1},{label:'Step 3 of 4 · Details',q:'Tell us about the event',hint:'These details help Anthony confirm availability and prepare your quote.',render:renderStep2},{label:'Step 4 of 4 · Contact',q:'Last step — how can we reach you?',hint:"Fill this in and hit Submit. Your request goes straight to Anthony — no extra steps on your end.",render:renderStep3}][step];
  if(!s) return;

  const isLast = step === TOTAL - 1;
  let nd = step===0?!A.eventType:step===1?!(A.booth&&A.hrs):step===2?!(A.date&&A.startTime&&A.venue.trim()&&A.prints&&A.guests):false;

  document.getElementById('quiz').innerHTML = `
    <div class="card">
      <div class="card-label">${s.label}</div>
      <div class="card-q">${s.q}</div>
      <p class="card-hint">${s.hint}</p>
      ${s.render()}
      ${!isLast?`<div class="btn-row">
        ${step>0?`<button class="btn-back" onclick="goBack()">← Back</button>`:'<div></div>'}
        <button class="btn-next" id="btnNext" onclick="advance()" ${nd?'disabled':''}>Next →</button>
      </div>`:step>0?`<button class="btn-back" onclick="goBack()" style="margin-top:.5rem;background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.73rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-dim)">← Back</button>`:''}
    </div>`;
}

/* ── INTERACTIONS ── */
function pick(key,val,el){
  A[key]=val;
  const g=el.dataset.group||key;
  document.querySelectorAll(`[data-group="${g}"]`).forEach(b=>b.classList.remove('sel'));
  if(!el.dataset.group) document.querySelectorAll('.tile').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  if(step===0){const b=document.getElementById('btnNext');if(b)b.disabled=!A.eventType;}
  if(step===1){const b=document.getElementById('btnNext');if(b)b.disabled=!(A.booth&&A.hrs);}
}
function sf(k,v){A[k]=v}
function chk2(){const ok=A.date&&A.startTime&&A.venue.trim()&&A.guests;const b=document.getElementById('btnNext');if(b)b.disabled=!ok}
function chk3(){const ok=A.name.trim()&&A.phone.trim();const b=document.getElementById('btnSubmit');if(b)b.disabled=!ok}
function advance(){step++;render();window.scrollTo({top:0,behavior:'smooth'})}
function goBack(){step--;render();window.scrollTo({top:0,behavior:'smooth'})}
function restart(){step=0;Object.assign(A,{eventType:null,date:'',startTime:'',venue:'',booth:null,hrs:null,prints:'no',guests:null,name:'',phone:'',email:'',notes:''});render();window.scrollTo({top:0,behavior:'smooth'})}

/* ── PACKAGE MATCH ── */
function matchPkg(){
  if(!A.booth||A.booth==='unsure') return null;
  const tH=parseInt(A.hrs)||2,up=['wedding','quince','corporate'].includes(A.eventType);
  const pool=PKGS.filter(p=>p.booth===A.booth);
  const hrs=(A.booth==='studio'&&tH===2)?3:tH;
  const exact=pool.filter(p=>p.hrs===hrs);
  if(!exact.length) return pool.sort((a,b)=>Math.abs(a.hrs-hrs)-Math.abs(b.hrs-hrs))[0];
  if(exact.length===1) return exact[0];
  return up?(exact.find(p=>p.tag)||exact[exact.length-1]):exact[0];
}

/* ── FORMAT ── */
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+day}, ${y}`}
function fmtTime(t){if(!t)return'—';const[h,m]=t.split(':');const hr=+h;return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`}

/* ── FORMSPREE SUBMIT ── */
async function submitForm(){
  const pkg=matchPkg();
  const btn=document.getElementById('btnSubmit');
  const lbl=document.getElementById('submitLabel');
  const spin=document.getElementById('spinner');
  btn.disabled=true; lbl.textContent='Sending…'; spin.style.display='block';

  try{
    const res=await fetch(`https://formspree.io/f/${FORMSPREE_ID}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({
        _subject:`Quote Request — ${A.name} · ${EL[A.eventType]||A.eventType} · ${fmtDate(A.date)}`,
        'Name':A.name,
        'Phone':A.phone,
        'Email':A.email||'(not provided)',
        'Event Type':EL[A.eventType]||A.eventType,
        'Event Date':fmtDate(A.date),
        'Start Time':fmtTime(A.startTime),
        'Venue':A.venue,
        'Booth':BL[A.booth]||A.booth,
        'Duration':`${A.hrs} hours`,
        'Prints':A.prints==='yes'?'Yes — Prints + Digital':'Digital Only',
        'Guest Count':A.guests,
        'Recommended Package':pkg?`${pkg.name} — $${pkg.price}`:'To be determined',
        'Notes':A.notes||'(none)',
      }),
    });
    if(res.ok){showSuccess(pkg);}
    else{const d=await res.json();showError(pkg,d?.errors?.[0]?.message||'Submission failed.');}
  }catch(e){
    showError(pkg,'Network error. Please use the backup options below.');
  }
}

/* ── SUCCESS ── */
function showSuccess(pkg){
  updateProgress(true);
  document.getElementById('quiz').innerHTML=`
    <div class="success-card">
      <span class="success-icon">🎉</span>
      <div class="success-title">You're all set!</div>
      <p class="success-msg">Your quote request went straight to Anthony. He'll reach out to confirm your date and lock everything in — usually within a few hours.</p>
      ${pkg?`<div class="success-pkg">
        <div class="success-pkg-label">Recommended Package${pkg.tag?` · ${pkg.tag}`:''}</div>
        <div class="success-pkg-name">${pkg.name} Package</div>
        <div class="success-pkg-price">$${pkg.price}</div>
        <div class="success-pkg-desc">${pkg.tagline}</div>
      </div>`:''}
      <div class="success-divider"></div>
      <p class="success-contact">Questions in the meantime? Text or call Anthony directly at<br><strong>(781) 632-8313</strong></p>
      <button class="btn-another" onclick="restart()">Submit another request</button>
    </div>`;
}

/* ── ERROR FALLBACK ── */
function showError(pkg,msg){
  updateProgress(true);
  const lines=[`Hi Anthony! Quote request from your website.`,'',`Name: ${A.name}`,`Phone: ${A.phone}`,`Event: ${EL[A.eventType]||A.eventType}`,`Date: ${fmtDate(A.date)} at ${fmtTime(A.startTime)}`,`Venue: ${A.venue}`,`Booth: ${BL[A.booth]||A.booth}`,`Duration: ${A.hrs} hours`,`Prints: ${A.prints==='yes'?'Yes — Prints + Digital':'Digital Only'}`,`Guests: ${A.guests}`,pkg?`Package: ${pkg.name} — $${pkg.price}`:'',A.notes?`Notes: ${A.notes}`:''].filter(Boolean).join('\n').trim();
  const isA=/android/i.test(navigator.userAgent);
  const sms=`sms:+17816328313${isA?'?':'&'}body=${encodeURIComponent(lines)}`;
  const mail=`mailto:tjselfiestation@gmail.com?subject=${encodeURIComponent('Quote Request — '+A.name)}&body=${encodeURIComponent(lines)}`;
  document.getElementById('quiz').innerHTML=`
    <div class="card">
      <div class="card-label">Almost there</div>
      <div class="card-q" style="font-size:1.3rem">Couldn't send automatically</div>
      <div class="error-note">⚠️ ${msg} Use one of the options below — your info is pre-filled.</div>
      <div class="fallback-btns">
        <a href="${sms}" class="btn-sms">📱 Text Anthony (Fastest)</a>
        <a href="${mail}" class="btn-email">✉️ Send via Email</a>
      </div>
      <div class="restart-wrap"><button class="restart-btn" onclick="restart()">↺ Start over</button></div>
    </div>`;
}

/* ── PROGRESS ── */
function updateProgress(allDone){
  for(let i=0;i<TOTAL;i++){
    const dot=document.getElementById('pd'+i);
    const circle=dot.querySelector('.prog-dot-circle');
    dot.classList.remove('active','done');
    if(allDone||i<step){dot.classList.add('done');circle.textContent='✓';}
    else if(i===step){dot.classList.add('active');circle.textContent=i+1;}
    else{circle.textContent=i+1;}
    if(i<TOTAL-1){const c=document.getElementById('pc'+i);if(c)c.querySelector('.prog-connector-fill').style.width=(allDone||i<step)?'100%':'0%';}
  }
}


// ── SCROLL PROGRESS ──
const qBar = document.getElementById('q-progress');
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = (window.scrollY / (doc.scrollHeight - doc.clientHeight)) * 100 || 0;
  if(qBar) qBar.style.width = Math.min(pct, 100) + '%';
}, { passive: true });

// ── NAV SHRINK ──
const qNav = document.querySelector('nav');
window.addEventListener('scroll', () => {
  qNav && (window.scrollY > 40 ? qNav.classList.add('scrolled') : qNav.classList.remove('scrolled'));
}, { passive: true });

// ── CURSOR GLOW ──
const cg = document.getElementById('cursor-glow-q');
if(window.matchMedia('(pointer:fine)').matches && cg){
  document.addEventListener('mousemove', e => {
    cg.style.left = e.clientX+'px';
    cg.style.top  = e.clientY+'px';
    cg.style.opacity = '1';
  });
  document.addEventListener('mouseleave', () => cg.style.opacity = '0');
}

// ── SLIDE TRANSITION WRAPPER ──
let _lastDir = 'forward';
const _origAdvance = advance;
const _origGoBack  = goBack;
advance = function(){
  _lastDir = 'forward';
  _origAdvance();
  const card = document.querySelector('#quiz .card');
  if(card){ card.classList.add('slide-in'); }
};
goBack = function(){
  _lastDir = 'back';
  _origGoBack();
  const card = document.querySelector('#quiz .card');
  if(card){ card.classList.add('slide-in-back'); }
};

// ── EYEBROW ANIMATE ON LOAD ──
setTimeout(() => {
  const intro = document.querySelector('.intro');
  if(intro) intro.classList.add('visible');
}, 300);

// ── CONFETTI ON SUCCESS ──
function launchConfetti(){
  const colors = ['#c9a84c','#e8c96a','#fff8e7','#f5f0e8','#b8942e'];
  for(let i=0;i<80;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText = `left:${Math.random()*100}vw;background:${color};--dur:${1.2+Math.random()*1.8}s;--delay:${Math.random()*0.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// Patch showSuccess to trigger confetti
const _origShowSuccess = showSuccess;
showSuccess = function(pkg){
  _origShowSuccess(pkg);
  launchConfetti();
};

// ── TILE RIPPLE FEEDBACK ──
document.addEventListener('click', function(e){
  const tile = e.target.closest('.tile');
  if(tile){
    tile.style.animation = 'none';
    void tile.offsetWidth; // reflow
    tile.style.animation = '';
  }
});

render();
</script>
